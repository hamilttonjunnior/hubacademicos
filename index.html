<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Académicos - Portal de Gestão</title>
    <!-- Google Fonts para um visual moderno e limpo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Variáveis de cores para facilitar ajustes */
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --card-border: #262626;
            --card-hover-border: #ffffff;
            --text-main: #ffffff;
            --text-secondary: #8a8a8a;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* Header e Logo */
        header {
            text-align: center;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: grayscale(100%) contrast(110%);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Container Principal das Opções */
        main {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1rem 0;
            animation: slideUp 0.8s ease-out;
        }

        @media (min-width: 600px) {
            main {
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
            }
        }

        /* Estilo dos Botões / Cards */
        .portal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Efeito de brilho de fundo ao passar o rato */
        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-hover-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Ícones minimalistas em CSS */
        .icon {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .portal-card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .portal-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            font-weight: 300;
        }

        /* Footer */
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Substitui "logo.png" pelo nome/caminho real da imagem da logo dos Académicos -->
            <img src="logo.png" alt="FC Académicos Logo">
        </div>
        <h1>FC Académicos</h1>
        <p class="subtitle">Selecione a plataforma de acesso</p>
    </header>

    <main>
        <!-- Card 1: Calendário de Torneios -->
        <a href="https://hamilttonjunnior.github.io/calendariotorneios/" class="portal-card">
            <div class="icon">
                <!-- Ícone minimalista de Calendário (SVG) -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </div>
            <h2>Calendário de Torneios</h2>
            <p>Consulte as datas, locais e detalhes de todos os torneios oficiais.</p>
        </a>

        <!-- Card 2: Marcação de Jogos -->
        <a href="https://hamilttonjunnior.github.io/testeacademicos" class="portal-card">
            <div class="icon">
                <!-- Ícone minimalista de Prancheta/Marcação (SVG) -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    <line x1="9" y1="12" x2="15" y2="12"></line>
                    <line x1="9" y1="16" x2="13" y2="16"></line>
                </svg>
            </div>
            <h2>Marcação de Jogos</h2>
            <p>Agende novas partidas, defina horários e organize as equipas em campo.</p>
        </a>
    </main>

    <footer>
        <p>&copy; 2026 FC Académicos. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
